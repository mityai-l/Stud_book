<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель журнала | Учет по группам</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #e53e3e;
        }

        .btn-danger:hover {
            background: #c53030;
        }

        .btn-success {
            background: #48bb78;
        }

        .btn-success:hover {
            background: #38a169;
        }

        .btn-warning {
            background: #ed8936;
        }

        .btn-warning:hover {
            background: #dd6b20;
        }

        .group-filter {
            margin: 20px 0;
            padding: 15px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            background: white;
            border-radius: 10px;
            overflow-x: auto;
            display: block;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background: #667eea;
            color: white;
            position: sticky;
            top: 0;
        }

        input, select {
            padding: 8px;
            border: 1px solid #cbd5e0;
            border-radius: 5px;
            width: 100%;
        }

        .student-row:hover {
            background: #f7fafc;
        }

        .json-output {
            background: #2d3748;
            color: #68d391;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 400px;
            overflow: auto;
        }

        .group-stats {
            display: inline-block;
            padding: 5px 10px;
            background: #edf2f7;
            border-radius: 5px;
            margin: 5px;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            th, td { font-size: 0.8em; padding: 8px; }
            .btn { padding: 8px 12px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔒 Админ-панель журнала</h1>
            <p>Учет практических работ и посещаемости по группам</p>
        </div>

        <div class="controls">
            <button class="btn btn-success" onclick="addStudent()">➕ Добавить студента</button>
            <button class="btn" onclick="addGroup()">👥 Добавить группу</button>
            <button class="btn" onclick="exportJSON()">📥 Экспорт JSON</button>
            <button class="btn" onclick="copyJSON()">📋 Копировать JSON</button>
            <button class="btn" onclick="generateMockData()">🎲 Сгенерировать тестовые данные</button>
            <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importJSON(this)">
            <button class="btn" onclick="document.getElementById('importFile').click()">📂 Импорт JSON</button>
        </div>

        <div class="group-filter">
            <strong>📊 Фильтр по группам:</strong>
            <div id="groupButtons"></div>
        </div>

        <div style="overflow-x: auto;">
            <table id="studentsTable">
                <thead>
                    <tr>
                        <th>Студент</th>
                        <th>Группа</th>
                        <th>Выполнено работ</th>
                        <th>Всего работ</th>
                        <th>Посещаемость (%)</th>
                        <th>Рейтинг</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="studentsTableBody">
                </tbody>
            </table>
        </div>

        <div class="json-output" id="jsonOutput">
            // Здесь будет JSON для копирования в data/students.json
        </div>
    </div>

    <script>
        let students = [];
        let currentGroupFilter = 'all';

        function calculateRating(student) {
            const worksScore = (student.completedWorks / student.totalWorks) * 100;
            const attendanceScore = student.attendance;
            const rating = (worksScore * 0.7 + attendanceScore * 0.3);
            return Math.round(rating * 10) / 10;
        }

        function getUniqueGroups() {
            const groups = new Set();
            students.forEach(s => groups.add(s.group));
            return Array.from(groups).sort();
        }

        function renderGroupButtons() {
            const groups = getUniqueGroups();
            const container = document.getElementById('groupButtons');
            container.innerHTML = '';
            
            const allBtn = document.createElement('button');
            allBtn.textContent = `📊 Все (${students.length})`;
            allBtn.className = `btn ${currentGroupFilter === 'all' ? 'btn-success' : ''}`;
            allBtn.style.margin = '5px';
            allBtn.onclick = () => {
                currentGroupFilter = 'all';
                renderGroupButtons();
                renderTable();
            };
            container.appendChild(allBtn);
            
            groups.forEach(group => {
                const count = students.filter(s => s.group === group).length;
                const btn = document.createElement('button');
                btn.textContent = `👥 ${group} (${count})`;
                btn.className = `btn ${currentGroupFilter === group ? 'btn-success' : ''}`;
                btn.style.margin = '5px';
                btn.onclick = () => {
                    currentGroupFilter = group;
                    renderGroupButtons();
                    renderTable();
                };
                container.appendChild(btn);
            });
        }

        function getFilteredStudents() {
            if (currentGroupFilter === 'all') return students;
            return students.filter(s => s.group === currentGroupFilter);
        }

        function renderTable() {
            const tbody = document.getElementById('studentsTableBody');
            tbody.innerHTML = '';
            
            const filtered = getFilteredStudents();
            
            filtered.forEach((student, index) => {
                const row = tbody.insertRow();
                row.className = 'student-row';
                
                row.insertCell(0).innerHTML = `<input type="text" value="${student.name}" onchange="updateStudent(${students.indexOf(student)}, 'name', this.value)">`;
                
                const groupSelect = document.createElement('select');
                const groups = getUniqueGroups();
                if (groups.length === 0) groups.push('Группа 1');
                groups.forEach(g => {
                    const option = document.createElement('option');
                    option.value = g;
                    option.textContent = g;
                    if (student.group === g) option.selected = true;
                    groupSelect.appendChild(option);
                });
                groupSelect.onchange = () => updateStudent(students.indexOf(student), 'group', groupSelect.value);
                row.insertCell(1).appendChild(groupSelect);
                
                row.insertCell(2).innerHTML = `<input type="number" value="${student.completedWorks}" min="0" max="${student.totalWorks}" onchange="updateStudent(${students.indexOf(student)}, 'completedWorks', parseInt(this.value))">`;
                row.insertCell(3).innerHTML = `<input type="number" value="${student.totalWorks}" min="1" onchange="updateStudent(${students.indexOf(student)}, 'totalWorks', parseInt(this.value))">`;
                row.insertCell(4).innerHTML = `<input type="number" value="${student.attendance}" min="0" max="100" onchange="updateStudent(${students.indexOf(student)}, 'attendance', parseInt(this.value))">`;
                
                const rating = calculateRating(student);
                student.rating = rating;
                row.insertCell(5).innerHTML = `<strong style="color: #667eea; font-size: 1.1em;">${rating}</strong>`;
                
                row.insertCell(6).innerHTML = `<button class="btn-danger" style="padding: 5px 10px;" onclick="deleteStudent(${students.indexOf(student)})">🗑️ Удалить</button>`;
            });
            
            updateJSONOutput();
        }

        function updateStudent(index, field, value) {
            students[index][field] = value;
            if (field === 'completedWorks' && value > students[index].totalWorks) {
                students[index].completedWorks = students[index].totalWorks;
            }
            if (field === 'totalWorks' && value < students[index].completedWorks) {
                students[index].completedWorks = value;
            }
            renderGroupButtons();
            renderTable();
        }

        function addStudent() {
            const defaultGroup = getUniqueGroups()[0] || 'Новая группа';
            students.push({
                name: "Новый студент",
                group: defaultGroup,
                completedWorks: 0,
                totalWorks: 10,
                attendance: 100,
                rating: 0
            });
            renderGroupButtons();
            renderTable();
        }

        function addGroup() {
            const groupName = prompt('Введите название группы:', 'Новая группа');
            if (groupName) {
                const existingGroups = getUniqueGroups();
                if (!existingGroups.includes(groupName)) {
                    alert(`Группа "${groupName}" добавлена. Теперь вы можете назначать студентов на эту группу.`);
                    renderGroupButtons();
                    renderTable();
                } else {
                    alert('Такая группа уже существует!');
                }
            }
        }

        function deleteStudent(index) {
            if (confirm('Удалить студента?')) {
                students.splice(index, 1);
                renderGroupButtons();
                renderTable();
            }
        }

        function updateJSONOutput() {
            const output = students.map(s => ({
                name: s.name,
                group: s.group,
                completedWorks: s.completedWorks,
                totalWorks: s.totalWorks,
                attendance: s.attendance,
                rating: calculateRating(s)
            }));
            document.getElementById('jsonOutput').textContent = JSON.stringify(output, null, 2);
        }

        function exportJSON() {
            const data = JSON.stringify(JSON.parse(document.getElementById('jsonOutput').textContent), null, 2);
            const blob = new Blob([data], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'students.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function copyJSON() {
            const json = document.getElementById('jsonOutput').textContent;
            navigator.clipboard.writeText(json);
            alert('JSON скопирован в буфер обмена!');
        }

        function importJSON(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    students = imported.map(s => ({
                        ...s,
                        rating: calculateRating(s)
                    }));
                    renderGroupButtons();
                    renderTable();
                    alert('Данные импортированы!');
                } catch(err) {
                    alert('Ошибка импорта: неверный формат JSON');
                }
            };
            reader.readAsText(file);
        }

        function generateMockData() {
            const groups = ['ПИ-101', 'ПИ-102', 'ИС-201', 'РПО-301'];
            const names = [
                'Иванов Иван', 'Петрова Анна', 'Сидоров Сергей', 'Козлова Мария',
                'Смирнов Алексей', 'Васильева Елена', 'Попов Дмитрий', 'Соколова Ольга',
                'Михайлов Артем', 'Федорова Ирина', 'Морозов Владимир', 'Волкова Наталья'
            ];
            
            students = [];
            for (let i = 0; i < 12; i++) {
                const totalWorks = 15;
                const completedWorks = Math.floor(Math.random() * (totalWorks + 1));
                const attendance = Math.floor(Math.random() * (100 - 50 + 1) + 50);
                const student = {
                    name: names[i % names.length] + (Math.floor(i / names.length) + 1),
                    group: groups[Math.floor(Math.random() * groups.length)],
                    completedWorks: completedWorks,
                    totalWorks: totalWorks,
                    attendance: attendance,
                    rating: 0
                };
                student.rating = calculateRating(student);
                students.push(student);
            }
            renderGroupButtons();
            renderTable();
            alert('Сгенерировано 12 тестовых студентов!');
        }

        // Инициализация с примерными данными
        students = [
            { name: "Иванов Иван", group: "ПИ-101", completedWorks: 12, totalWorks: 15, attendance: 95, rating: 0 },
            { name: "Петрова Анна", group: "ПИ-101", completedWorks: 14, totalWorks: 15, attendance: 98, rating: 0 },
            { name: "Сидоров Сергей", group: "ПИ-102", completedWorks: 10, totalWorks: 15, attendance: 82, rating: 0 },
            { name: "Козлова Мария", group: "ПИ-101", completedWorks: 15, totalWorks: 15, attendance: 100, rating: 0 },
            { name: "Смирнов Алексей", group: "ПИ-102", completedWorks: 8, totalWorks: 15, attendance: 70, rating: 0 }
        ];
        
        students.forEach(s => s.rating = calculateRating(s));
        
        renderGroupButtons();
        renderTable();
    </script>
</body>
</html>
